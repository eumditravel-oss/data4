<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QS 통합 비교표 분석기</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* 비교표 전용 레이아웃 보강 */
    .excel-view-container {
      overflow: auto;
      max-height: 80vh;
      border: 1px solid #dcdfe6;
      border-radius: 8px;
    }
    .excel-table {
      border-collapse: separate;
      border-spacing: 0;
      white-space: nowrap; /* 텍스트 줄바꿈 방지 */
    }
    /* 헤더 및 첫 두 열 고정 (Sticky) */
    .excel-table thead th {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #f5f7fa;
      border-bottom: 2px solid #cfd4db;
    }
    .excel-table td:nth-child(1), .excel-table th:nth-child(1) {
      position: sticky; left: 0; z-index: 10; background: #fff; border-right: 1px solid #dcdfe6;
    }
    .excel-table td:nth-child(2), .excel-table th:nth-child(2) {
      position: sticky; left: 80px; z-index: 10; background: #fff; border-right: 2px solid #cfd4db;
    }
    .row-group-end td { border-bottom: 2px solid #444 !important; } /* 층별 구분선 */
    .val-zero { color: #ccc; }
    .val-active { color: #000; font-weight: 500; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__title">
        <h1>QS 통합 비교표 확인</h1>
        <p>층별 4행 구성 (레미콘/거푸집/철근D/철근H)</p>
      </div>
      <button class="btn btn-ghost" onclick="location.reload()">초기화</button>
    </header>

    <main class="page">
      <section class="tabs">
        <button class="tab is-active" data-tab="upload">1. 파일 업로드</button>
        <button class="tab" data-tab="view">2. 통합 수량표 확인</button>
      </section>

      <section id="upload-tab" class="tab-panel is-active">
        <div class="upload-card">
          <input type="file" id="file-main" multiple accept=".xlsx, .csv" hidden />
          <label for="file-main" class="upload-label">
            <span>QS_통합템플릿_리포트 파일을 선택하세요</span>
          </label>
          <div id="file-list" class="file-list" style="margin-top:20px;"></div>
        </div>
      </section>

      <section id="view-tab" class="tab-panel">
        <div class="panel">
          <div class="toolbar">
            <div class="filter-group">
              <label>동 선택:</label>
              <select id="filter-dong" class="input" style="width:200px;"></select>
            </div>
            <button id="btn-excel" class="btn btn-success" style="margin-left:auto;">비교표 엑셀 다운로드</button>
          </div>
          <div class="excel-view-container">
            <table id="main-table" class="excel-table">
              <thead id="table-head"></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
